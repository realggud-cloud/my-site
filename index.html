<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>alofly • Coming Soon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');
        
        :root {
            --primary: #22d3ee;
        }
        
        body {
            font-family: 'Inter', system_ui, sans-serif;
        }
        
        .heading-font {
            font-family: 'Space Grotesk', system_ui, sans-serif;
            font-weight: 600;
            letter-spacing: -0.025em;
        }

        .chroma-text {
            background: linear-gradient(90deg, #22d3ee, #6366f1, #a855f7, #22d3ee);
            background-size: 300% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: chroma-shift 6s ease infinite;
        }

        @keyframes chroma-shift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 300% 50%; }
        }

        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .section-bg {
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
        }

        canvas {
            filter: drop-shadow(0 0 20px rgba(34, 211, 238, 0.15));
        }

        .airplane {
            position: absolute;
            animation-timing-function: linear;
            animation-iteration-count: infinite;
        }

        .airplane-1 { animation: fly1 25s linear infinite; }
        .airplane-2 { animation: fly2 32s linear infinite; }
        .airplane-3 { animation: fly3 28s linear infinite; }

        @keyframes fly1 {
            0% { transform: translateX(-150px) translateY(40px); }
            100% { transform: translateX(calc(100vw + 150px)) translateY(-80px); }
        }
        
        @keyframes fly2 {
            0% { transform: translateX(-200px) translateY(120px); }
            100% { transform: translateX(calc(100vw + 200px)) translateY(60px); }
        }
        
        @keyframes fly3 {
            0% { transform: translateX(-180px) translateY(-30px); }
            100% { transform: translateX(calc(100vw + 180px)) translateY(90px); }
        }
    </style>
</head>
<body class="bg-[#020617] text-white overflow-x-hidden">
    <!-- Background subtle grid -->
    <div class="fixed inset-0 bg-[radial-gradient(#1e2937_0.8px,transparent_1px)] bg-[length:4px_4px] opacity-30"></div>

    <!-- Flying Airplanes -->
    <div class="fixed inset-0 pointer-events-none z-10">
        <!-- Airplane 1 -->
        <div class="airplane airplane-1" style="top: 18%; left: 0; animation-delay: 0s;">
            <svg width="48" height="24" viewBox="0 0 48 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M42 12L6 12" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/>
                <path d="M38 8L42 12L38 16" stroke="#64748b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M10 6L6 12L10 18" stroke="#64748b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
        
        <!-- Airplane 2 -->
        <div class="airplane airplane-2" style="top: 35%; left: 0; animation-delay: -8s;">
            <svg width="42" height="21" viewBox="0 0 48 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M42 12L6 12" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/>
                <path d="M38 8L42 12L38 16" stroke="#64748b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
        
        <!-- Airplane 3 -->
        <div class="airplane airplane-3" style="top: 65%; left: 0; animation-delay: -15s;">
            <svg width="38" height="19" viewBox="0 0 48 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M42 12L6 12" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/>
                <path d="M38 8L42 12L38 16" stroke="#64748b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
    </div>

    <div class="relative z-20 min-h-screen flex items-center justify-center px-6">
        <div class="max-w-5xl w-full">
            
            <!-- Logo -->
            <div class="flex justify-center mb-8">
                <img src="https://support.alofly.io/images/logo-light.png" 
                     alt="alofly" 
                     class="h-12 md:h-14 w-auto">
            </div>

            <!-- Main Content -->
            <div class="text-center">
                <div class="inline-flex items-center gap-x-2 px-4 py-1.5 rounded-2xl glass mb-6 border border-white/10">
                    <div class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></div>
                    <span class="text-sm font-medium tracking-widest text-emerald-400">GLOBAL eSIM NETWORK</span>
                </div>

                <h1 class="text-6xl md:text-7xl lg:text-8xl font-semibold heading-font tracking-tighter mb-4">
                    <span class="chroma-text">Stay connected.</span><br>
                    <span class="text-white">Anywhere.</span>
                </h1>
                
                <p class="max-w-md mx-auto text-xl text-slate-400 mb-10">
                    Premium global eSIM is launching soon.<br>
                    Instant connectivity in 200+ countries.
                </p>

                <!-- Rotating Globe -->
                <div class="relative flex justify-center mb-12">
                    <div class="relative">
                        <canvas id="globe" width="420" height="420" 
                                class="rounded-full"></canvas>
                        
                        <!-- Glow effect behind globe -->
                        <div class="absolute inset-0 rounded-full bg-cyan-500/10 blur-3xl -z-10 scale-90"></div>
                    </div>
                </div>

                <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
                    <button onclick="document.getElementById('notify').scrollIntoView({ behavior: 'smooth' })" 
                            class="px-8 py-4 bg-white text-black font-semibold rounded-2xl hover:bg-white/90 transition-all flex items-center gap-x-2 text-lg">
                        <i class="fa-solid fa-bell mr-2"></i>
                        Get notified on launch
                    </button>
                    
                    <a href="#" class="px-8 py-4 border border-white/30 hover:bg-white/5 font-medium rounded-2xl transition-all flex items-center gap-x-2 text-lg">
                        Learn more
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Notify Section -->
    <div id="notify" class="relative z-20 max-w-md mx-auto px-6 pb-16">
        <div class="glass rounded-3xl p-8 border border-white/10">
            <h3 class="font-semibold text-xl mb-1 text-center">Be the first to know</h3>
            <p class="text-slate-400 text-sm text-center mb-6">We'll send you early access when we launch.</p>
            
            <div class="flex gap-3">
                <input type="email" placeholder="your@email.com" 
                       class="flex-1 bg-white/5 border border-white/20 rounded-2xl px-5 py-3.5 text-sm focus:outline-none focus:border-cyan-400/50 placeholder:text-slate-500">
                <button class="px-7 bg-white text-black font-semibold rounded-2xl hover:bg-white/90 transition-all whitespace-nowrap">
                    Notify me
                </button>
            </div>
        </div>
    </div>

    <script>
        // Tailwind script
        function initializeTailwind() {
            document.documentElement.style.setProperty('--accent', '#22d3ee');
        }

        // === ROTATING DOT GLOBE ===
        function createGlobe() {
            const canvas = document.getElementById('globe');
            const ctx = canvas.getContext('2d');
            
            const width = canvas.width;
            const height = canvas.height;
            const centerX = width / 2;
            const centerY = height / 2;
            const radius = 160;

            let points = [];
            const numPoints = 420;
            let rotation = 0;

            // Generate points on sphere
            function generatePoints() {
                points = [];
                for (let i = 0; i < numPoints; i++) {
                    const phi = Math.acos(2 * Math.random() - 1);
                    const theta = 2 * Math.PI * Math.random();
                    
                    points.push({
                        x: radius * Math.sin(phi) * Math.cos(theta),
                        y: radius * Math.sin(phi) * Math.sin(theta),
                        z: radius * Math.cos(phi),
                        size: Math.random() * 1.8 + 1.2
                    });
                }
            }

            generatePoints();

            function project(x, y, z) {
                const scale = 280 / (280 + z);
                return {
                    x: centerX + x * scale,
                    y: centerY + y * scale,
                    scale: scale
                };
            }

            function draw() {
                ctx.clearRect(0, 0, width, height);
                
                // Subtle background circle
                ctx.strokeStyle = 'rgba(148, 163, 184, 0.08)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
                ctx.stroke();

                // Sort points by z for proper depth
                const sortedPoints = [...points].sort((a, b) => b.z - a.z);

                for (let point of sortedPoints) {
                    // Rotate around Y axis
                    const cos = Math.cos(rotation);
                    const sin = Math.sin(rotation);
                    
                    const x = point.x * cos - point.z * sin;
                    const z = point.x * sin + point.z * cos;
                    const y = point.y;

                    const projected = project(x, y, z);
                    
                    const alpha = (z + radius) / (radius * 2);
                    const size = point.size * projected.scale * 0.9;

                    // Dot
                    ctx.fillStyle = `rgba(103, 232, 249, ${0.6 + alpha * 0.4})`;
                    ctx.beginPath();
                    ctx.arc(projected.x, projected.y, size, 0, Math.PI * 2);
                    ctx.fill();

                    // Add subtle glow to front dots
                    if (z > 0) {
                        ctx.fillStyle = `rgba(103, 232, 249, ${alpha * 0.3})`;
                        ctx.beginPath();
                        ctx.arc(projected.x, projected.y, size * 2.5, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }

                rotation += 0.0025; // Rotation speed
                requestAnimationFrame(draw);
            }

            draw();
            
            // Pause rotation on hover
            canvas.addEventListener('mouseenter', () => {
                canvas.style.transition = 'filter 0.3s';
            });
        }

        // Initialize everything
        function init() {
            initializeTailwind();
            createGlobe();
            
            // Optional: Make airplanes slightly more visible
            console.log('%c[alofly] Premium coming soon page loaded', 'color:#64748b');
        }

        window.onload = init;
    </script>
</body>
</html>
