<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AloFly eSIM • Coming Soon</title>
    
    <!-- Favicon -->
    <link rel="icon" href="https://support.alofly.io/images/logo-light-mobile.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');
        
        body {
            font-family: 'Inter', system_ui, sans-serif;
        }
        
        .heading-font {
            font-family: 'Space Grotesk', system_ui, sans-serif;
            font-weight: 600;
            letter-spacing: -0.03em;
        }

        .chroma-text {
            background: linear-gradient(90deg, #67e8f9, #6366f1, #c026ff, #67e8f9);
            background-size: 300% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: chroma-shift 5s ease infinite;
        }

        @keyframes chroma-shift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 300% 50%; }
        }

        .glass {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(148, 163, 184, 0.1);
        }

        canvas {
            filter: drop-shadow(0 25px 50px rgba(103, 232, 249, 0.15));
        }
        
        .airplane {
            position: absolute;
            animation-timing-function: linear;
            animation-iteration-count: infinite;
            opacity: 0.75;
        }
    </style>
</head>
<body class="bg-[#020617] text-white overflow-x-hidden">
    <!-- Subtle background -->
    <div class="fixed inset-0 bg-[radial-gradient(#1e2937_0.6px,transparent_1px)] bg-[length:3px_3px] opacity-40"></div>

    <!-- Flying Airplanes -->
    <div class="fixed inset-0 pointer-events-none z-10 overflow-hidden">
        <!-- Airplane 1 -->
        <div class="airplane" style="top: 22%; animation: fly-across 26s linear infinite;">
            <svg width="52" height="26" viewBox="0 0 64 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M8 16H52" stroke="#64748b" stroke-width="2" stroke-linecap="round"/>
                <path d="M48 10L54 16L48 22" stroke="#64748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M16 8L8 16L16 24" stroke="#64748b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                <!-- Wings -->
                <path d="M28 16L22 8L26 8" stroke="#64748b" stroke-width="1.5"/>
                <path d="M28 16L22 24L26 24" stroke="#64748b" stroke-width="1.5"/>
            </svg>
        </div>
        
        <!-- Airplane 2 -->
        <div class="airplane" style="top: 48%; animation: fly-across 34s linear infinite; animation-delay: -12s;">
            <svg width="46" height="23" viewBox="0 0 64 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M8 16H52" stroke="#64748b" stroke-width="1.8" stroke-linecap="round"/>
                <path d="M48 10L54 16L48 22" stroke="#64748b" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M20 9L12 16L20 23" stroke="#64748b" stroke-width="1.5"/>
            </svg>
        </div>
        
        <!-- Airplane 3 -->
        <div class="airplane" style="top: 68%; animation: fly-across 29s linear infinite; animation-delay: -20s;">
            <svg width="40" height="20" viewBox="0 0 64 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M8 16H52" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/>
                <path d="M48 11L53 16L48 21" stroke="#64748b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
    </div>

    <div class="relative z-20 min-h-screen flex items-center justify-center px-6 pt-8 pb-16">
        <div class="max-w-4xl w-full text-center">
            
            <!-- Logo -->
            <div class="flex justify-center mb-6">
                <img src="https://support.alofly.io/images/logo-light.png" 
                     alt="AloFly" 
                     class="h-11 md:h-12 w-auto">
            </div>

            <!-- Headline -->
            <h1 class="text-6xl md:text-7xl lg:text-8xl font-semibold heading-font tracking-[-2.5px] leading-none mb-4">
                <span class="chroma-text">Global eSIM.</span><br>
                <span class="text-white">Coming soon.</span>
            </h1>
            
            <p class="max-w-md mx-auto text-xl text-slate-400 mb-10">
                Instant connectivity in 200+ countries.<br>
                No roaming. No hassle.
            </p>

            <!-- Advanced Globe -->
            <div class="flex justify-center mb-8">
                <div class="relative">
                    <canvas id="globe" width="460" height="460" 
                            class="rounded-full"></canvas>
                    
                    <!-- Ambient glow -->
                    <div class="absolute inset-0 rounded-full bg-cyan-500/10 blur-[80px] -z-10 scale-[0.85]"></div>
                </div>
            </div>

            <p class="text-slate-500 text-sm tracking-widest">ALOFLY • POWERED BY GLOBAL NETWORKS</p>
            
        </div>
    </div>

    <script>
        // Tailwind script (optional but clean)
        function initTailwind() {
            // Already using CDN classes
        }

        // === ADVANCED ROTATING GLOBE ===
        function createAdvancedGlobe() {
            const canvas = document.getElementById('globe');
            const ctx = canvas.getContext('2d', { alpha: true });
            
            const width = canvas.width;
            const height = canvas.height;
            const centerX = width / 2;
            const centerY = height / 2;
            const radius = 175;

            let points = [];
            const numPoints = 650;
            let rotationY = 0;
            let rotationX = 0.3;

            function generatePoints() {
                points = [];
                for (let i = 0; i < numPoints; i++) {
                    const u = Math.random();
                    const v = Math.random();
                    const theta = 2 * Math.PI * u;
                    const phi = Math.acos(2 * v - 1);

                    points.push({
                        x: radius * Math.sin(phi) * Math.cos(theta),
                        y: radius * Math.sin(phi) * Math.sin(theta),
                        z: radius * Math.cos(phi),
                        size: Math.random() * 2.1 + 1.1
                    });
                }
            }

            generatePoints();

            function project(x, y, z) {
                const scale = 300 / (300 + z);
                return {
                    x: centerX + x * scale,
                    y: centerY + y * scale,
                    scale: scale,
                    z: z
                };
            }

            function draw() {
                ctx.clearRect(0, 0, width, height);

                // Subtle sphere outline
                ctx.strokeStyle = 'rgba(148, 163, 184, 0.06)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
                ctx.stroke();

                // Rotate points
                const cosY = Math.cos(rotationY);
                const sinY = Math.sin(rotationY);
                const cosX = Math.cos(rotationX);
                const sinX = Math.sin(rotationX);

                const sortedPoints = [];

                for (let p of points) {
                    // Y-axis rotation
                    let x = p.x * cosY - p.z * sinY;
                    let z = p.x * sinY + p.z * cosY;
                    let y = p.y;

                    // X-axis tilt
                    let y2 = y * cosX - z * sinX;
                    z = y * sinX + z * cosX;
                    y = y2;

                    const projected = project(x, y, z);
                    projected.originalSize = p.size;
                    sortedPoints.push(projected);
                }

                // Sort by depth
                sortedPoints.sort((a, b) => b.z - a.z);

                // Draw connecting lines (network effect)
                ctx.strokeStyle = 'rgba(103, 232, 249, 0.08)';
                ctx.lineWidth = 0.6;

                for (let i = 0; i < sortedPoints.length; i++) {
                    for (let j = i + 1; j < sortedPoints.length; j++) {
                        const p1 = sortedPoints[i];
                        const p2 = sortedPoints[j];
                        
                        const dx = p1.x - p2.x;
                        const dy = p1.y - p2.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        
                        if (dist < 55 && p1.z > -50 && p2.z > -50) {
                            ctx.beginPath();
                            ctx.moveTo(p1.x, p1.y);
                            ctx.lineTo(p2.x, p2.y);
                            ctx.stroke();
                        }
                    }
                }

                // Draw dots
                for (let p of sortedPoints) {
                    const alpha = Math.max(0.3, (p.z + radius) / (radius * 1.8));
                    const size = p.originalSize * p.scale * 0.85;

                    // Main dot
                    ctx.fillStyle = `rgba(103, 232, 249, ${alpha})`;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, size, 0, Math.PI * 2);
                    ctx.fill();

                    // Glow on front-facing dots
                    if (p.z > 20) {
                        ctx.fillStyle = `rgba(103, 232, 249, ${alpha * 0.25})`;
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, size * 3, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }

                rotationY += 0.0018;
                requestAnimationFrame(draw);
            }

            draw();
        }

        function init() {
            initTailwind();
            createAdvancedGlobe();
        }

        window.onload = init;
    </script>
</body>
</html>
