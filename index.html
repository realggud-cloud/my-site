<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AloFly eSIM • Coming Soon</title>
    <link rel="icon" href="https://support.alofly.io/images/logo-light-mobile.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');
        
        body {
            font-family: 'Inter', system_ui, sans-serif;
        }
        
        .heading-font {
            font-family: 'Space Grotesk', system_ui, sans-serif;
            font-weight: 600;
            letter-spacing: -0.03em;
        }

        .chroma-text {
            background: linear-gradient(90deg, #67e8f9, #6366f1, #c026ff, #67e8f9);
            background-size: 300% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: chroma-shift 5s ease infinite;
        }

        @keyframes chroma-shift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 300% 50%; }
        }

        .glass {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(148, 163, 184, 0.1);
        }

        .plane {
            position: absolute;
            font-size: 28px;
            z-index: 10;
            user-select: none;
            animation-timing-function: linear;
            animation-iteration-count: infinite;
        }

        /* Different flight paths */
        .plane-1 { animation: fly1 22s linear infinite; }
        .plane-2 { animation: fly2 29s linear infinite; }
        .plane-3 { animation: fly3 25s linear infinite; }
        .plane-4 { animation: fly4 31s linear infinite; }
        .plane-5 { animation: fly5 27s linear infinite; }

        @keyframes fly1 {
            0% { transform: translateX(-120px) translateY(0px); }
            100% { transform: translateX(calc(100vw + 120px)) translateY(40px); }
        }
        @keyframes fly2 {
            0% { transform: translateX(-100px) translateY(30px); }
            100% { transform: translateX(calc(100vw + 100px)) translateY(-25px); }
        }
        @keyframes fly3 {
            0% { transform: translateX(-130px) translateY(-20px); }
            100% { transform: translateX(calc(100vw + 130px)) translateY(35px); }
        }
        @keyframes fly4 {
            0% { transform: translateX(-90px) translateY(50px); }
            100% { transform: translateX(calc(100vw + 90px)) translateY(-15px); }
        }
        @keyframes fly5 {
            0% { transform: translateX(-110px) translateY(10px); }
            100% { transform: translateX(calc(100vw + 110px)) translateY(45px); }
        }
    </style>
</head>
<body class="bg-[#020617] text-white overflow-x-hidden">
    <!-- Background -->
    <div class="fixed inset-0 bg-[radial-gradient(#1e2937_0.6px,transparent_1px)] bg-[length:3px_3px] opacity-40"></div>

    <!-- Flying Airplane Emojis -->
    <div class="fixed inset-0 pointer-events-none z-10">
        <div class="plane plane-1" style="top: 15%; left: 0; animation-delay: 0s;">✈️</div>
        <div class="plane plane-2" style="top: 28%; left: 0; animation-delay: -6s; font-size: 24px;">🛫</div>
        <div class="plane plane-3" style="top: 52%; left: 0; animation-delay: -14s;">🛩️</div>
        <div class="plane plane-4" style="top: 68%; left: 0; animation-delay: -21s; font-size: 26px;">✈️</div>
        <div class="plane plane-5" style="top: 38%; left: 0; animation-delay: -9s;">🛫</div>
    </div>

    <div class="relative z-20 min-h-screen flex items-center justify-center px-6 pt-8 pb-16">
        <div class="max-w-4xl w-full text-center">
            
            <!-- Logo -->
            <div class="flex justify-center mb-6">
                <img src="https://support.alofly.io/images/logo-light.png" 
                     alt="AloFly" 
                     class="h-11 md:h-12 w-auto">
            </div>

            <!-- Green Dot Badge -->
            <div class="flex justify-center mb-6">
                <div class="inline-flex items-center gap-x-2 px-4 py-1.5 rounded-2xl glass border border-white/10">
                    <div class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></div>
                    <span class="text-sm font-medium tracking-widest text-emerald-400">GLOBAL eSIM NETWORK</span>
                </div>
            </div>

            <!-- Headline -->
            <h1 class="text-6xl md:text-7xl lg:text-8xl font-semibold heading-font tracking-[-2.5px] leading-none mb-4">
                <span class="chroma-text">Global eSIM.</span><br>
                <span class="text-white">Coming soon.</span>
            </h1>
            
            <p class="max-w-md mx-auto text-xl text-slate-400 mb-8">
                Instant connectivity in 200+ countries.<br>
                No roaming. No hassle.
            </p>

            <!-- Trust signals (eSIM style) -->
            <div class="flex flex-wrap justify-center gap-x-6 gap-y-2 mb-10 text-sm text-slate-400">
                <div class="flex items-center gap-x-2">
                    <span class="text-emerald-400">●</span> 
                    <span>200+ Countries</span>
                </div>
                <div class="flex items-center gap-x-2">
                    <span class="text-emerald-400">●</span> 
                    <span>Instant Activation</span>
                </div>
                <div class="flex items-center gap-x-2">
                    <span class="text-emerald-400">●</span> 
                    <span>24/7 Support</span>
                </div>
            </div>

            <!-- Matrix Pulsing Globe -->
            <div class="flex justify-center">
                <div class="relative">
                    <canvas id="globe" width="480" height="480" 
                            class="rounded-full"></canvas>
                </div>
            </div>

        </div>
    </div>

    <script>
        function createMatrixGlobe() {
            const canvas = document.getElementById('globe');
            const ctx = canvas.getContext('2d');
            
            const width = canvas.width;
            const height = canvas.height;
            const centerX = width / 2;
            const centerY = height / 2;
            const radius = 185;

            let points = [];
            const numPoints = 920;
            let rotation = 0;
            let time = 0;

            function generatePoints() {
                points = [];
                for (let i = 0; i < numPoints; i++) {
                    const u = Math.random();
                    const v = Math.random();
                    const theta = 2 * Math.PI * u;
                    const phi = Math.acos(2 * v - 1);

                    points.push({
                        x: radius * Math.sin(phi) * Math.cos(theta),
                        y: radius * Math.sin(phi) * Math.sin(theta),
                        z: radius * Math.cos(phi),
                        baseSize: Math.random() * 1.6 + 1.0
                    });
                }
            }

            generatePoints();

            function project(x, y, z) {
                const scale = 320 / (320 + z);
                return {
                    x: centerX + x * scale,
                    y: centerY + y * scale,
                    scale: scale,
                    z: z
                };
            }

            function draw() {
                ctx.clearRect(0, 0, width, height);
                time += 0.016;

                ctx.strokeStyle = 'rgba(60, 60, 90, 0.15)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
                ctx.stroke();

                const cos = Math.cos(rotation);
                const sin = Math.sin(rotation);

                const sortedPoints = [];

                for (let p of points) {
                    let x = p.x * cos - p.z * sin;
                    let z = p.x * sin + p.z * cos;
                    let y = p.y;

                    const projected = project(x, y, z);
                    projected.baseSize = p.baseSize;
                    projected.originalX = x;
                    sortedPoints.push(projected);
                }

                sortedPoints.sort((a, b) => b.z - a.z);

                ctx.strokeStyle = 'rgba(180, 120, 255, 0.06)';
                ctx.lineWidth = 0.6;

                for (let i = 0; i < sortedPoints.length; i++) {
                    for (let j = i + 1; j < sortedPoints.length; j++) {
                        const p1 = sortedPoints[i];
                        const p2 = sortedPoints[j];
                        const dx = p1.x - p2.x;
                        const dy = p1.y - p2.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);

                        if (dist < 48 && p1.z > -30 && p2.z > -30) {
                            ctx.beginPath();
                            ctx.moveTo(p1.x, p1.y);
                            ctx.lineTo(p2.x, p2.y);
                            ctx.stroke();
                        }
                    }
                }

                for (let p of sortedPoints) {
                    const depthAlpha = Math.max(0.2, (p.z + radius) / (radius * 1.7));
                    const pulse = Math.sin(time * 2.5 + p.originalX * 0.02) * 0.35 + 1;
                    const size = p.baseSize * p.scale * pulse * 0.95;

                    const colorShift = (p.originalX + radius) / (radius * 2);
                    let r, g, b;

                    if (colorShift < 0.5) {
                        r = 180 + colorShift * 80;
                        g = 80 + colorShift * 60;
                        b = 220;
                    } else {
                        r = 220;
                        g = 100 + (colorShift - 0.5) * 140;
                        b = 180 - (colorShift - 0.5) * 140;
                    }

                    ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${depthAlpha})`;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, size, 0, Math.PI * 2);
                    ctx.fill();

                    if (p.z > 10) {
                        ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${depthAlpha * 0.25})`;
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, size * 2.8, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }

                rotation += 0.0016;
                requestAnimationFrame(draw);
            }

            draw();
        }

        window.onload = function() {
            createMatrixGlobe();
        }
    </script>
</body>
</html>
